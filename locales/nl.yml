features:
  title: Functies
  subtitle: Belangrijkste functies van Hoyo Buddy
  description: Meer dan alleen HoYoLAB op Discord.
  show_off:
    title: Bouwkaarten voor je Karakters
    bullet1: • Meerdere sjablonen om uit te kiezen
    bullet2: • Enka Network-integratie
    bullet3: • Vat het hele team samen in één kaart
    bullet4: • Veel aanpassingsmogelijkheden
    bullet5: • Gebruik je eigen afbeeldingen
  make_life_easier:
    title: Automatische Taken en Herinneringen
    bullet1: "• Voltooi automatisch Traveling Mimo-taken, verdien punten en koop beloningen"
    bullet2: • Claim automatisch dagelijkse incheckbeloningen
    bullet3: • Wissel automatisch livestream- en andere cadeaucodes in
    bullet4: "• Resin-, dagelijkse commissie- en andere herinneringen"
  all_in_one:
    title: Alles op één plek
    bullet1: • Voeg accounts toe van verschillende spellen en Hoyoverse-accounts
    bullet2: • Gecentraliseerde ervaring met één bot
  free_and_open_source:
    title: Gratis en Open Source
    bullet1: • Volledig gratis te gebruiken
    bullet2: • Open source op GitHub
    bullet3: "• Geen advertenties, geen paywalls"
    bullet4: • Gemaakt met privacy en veiligheid in gedachten

about:
  title: "Veelzijdig, elegant en snel"
  description: |
    Hoyo Buddy biedt essentiële functies voor je Hoyoverse-ervaring en presenteert informatie op visueel aantrekkelijke manieren. Onze zorgvuldig ontworpen gebruikersinterface combineert schoonheid naadloos met functionaliteit.
    <br />
    <br />
    Hoyo Buddy maakt indruk met zowel zijn visueel aantrekkelijke ontwerp als bliksemsnelle prestaties. Onze programmeur heeft talloze uren geïnvesteerd in het optimaliseren van de bot, zodat je snel toegang hebt tot de informatie die je nodig hebt.
  stat:
    title: Gebruikt door
    description: Servers

cta:
  title: "Kun je nog steeds niet beslissen?"
  description: "Er zijn talloze Hoyoverse-gerelateerde Discord-bots beschikbaar, dus waarom zou je kiezen voor Hoyo Buddy? Wat onderscheidt Hoyo Buddy van de anderen, inclusief de bots die je misschien al gebruikt?"
  button: Lees er meer over

testimonials:
  title: Commando's
  subtitle: "Wat kan Hoyo Buddy doen?"
  description: Bekijk enkele van de populairste commando's in Hoyo Buddy!
  accounts:
    description: Centraliseer al je accounts moeiteloos op één locatie. Geniet van drie intuïtieve methoden om snel accounts toe te voegen.
  search:
    description: "Ontdek met gemak alles wat met Genshin Impact, HSR en ZZZ te maken heeft. Perfect om spelconcepten aan nieuwkomers te introduceren."
  notes:
    description: "Bekijk real-time notities met extra herinneringsfuncties, waardoor het bijhouden van resin, dagelijkse commissies en andere taken makkelijker wordt."
  characters:
    description: "Verzamel al je karakters in één uitgebreide kaart, ideaal om met anderen te delen voor advies over teambuilding."
  farm:
    description: Bekijk te farmen materialen in de domeinen van vandaag en stel herinneringen in om je te waarschuwen wanneer de materialen van een karakter of wapen te farmen zijn.
  profile:
    description: "Maak visueel verbluffende kaarten waarop je karakterbouws worden getoond, ideaal om te delen op sociale mediaplatforms."

faq:
  title: FAQ
  subtitle: "Heb je vragen? Kijk hier"
  description: "Als je nog andere vragen hebt, neem dan contact met ons op."
  free:
    question: "Is Hoyo Buddy gratis te gebruiken?"
    answer: |
      Ja, Hoyo Buddy is volledig gratis te gebruiken. Als je het graag gebruikt, overweeg dan om mij te steunen door
      <a href="https://link.seria.moe/donate" target="_blank" rel="noopener" class="text-primary hover:underline">
        te doneren
      </a> of
      <a href="https://github.com/seriaati/hoyo-buddy" rel="noopener" target="_blank" class="text-primary hover:underline">
        een ster te geven op GitHub
      </a>.
  open_source:
    question: "Is Hoyo Buddy open source?"
    answer: |
      Ja, Hoyo Buddy is open source. De broncode is te vinden op
      <a href="https://github.com/seriaati/hoyo-buddy" rel="noopener" target="_blank" class="text-primary hover:underline">
        GitHub
      </a>. Houd je bij het gebruik van de code aan de licentie.
  safe:
    question: "Is Hoyo Buddy veilig om te gebruiken?"
    answer: |
      Lees de
      <a href="https://hb-docs.seria.moe/docs/Account-Security" rel="noopener" target="_blank"
        class="text-primary hover:underline">
        Accountbeveiliging
      </a>-pagina op de wiki voor meer informatie. Voor gegevensprivacy, lees het
      <a href="https://github.com/seriaati/hoyo-buddy/blob/main/PRIVACY.md" rel="noopener" target="_blank"
        class="text-primary hover:underline">
        Privacybeleid
      </a>.
  contact:
    question: "Hoe neem ik contact op met de ontwikkelaar?"
    answer: |
      Je kunt mij rechtstreeks een bericht sturen op
      <a href="https://discord.com/users/410036441129943050" rel="noopener" target="_blank"
        class="text-primary hover:underline">
        Discord
      </a> of sluit je aan bij de
      <a href="https://dsc.gg/hoyo-buddy" target="_blank" rel="noopener" class="text-primary hover:underline">
        Discord-server
      </a> en ping me daar.
